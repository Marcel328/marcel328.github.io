name: CI and Deploy GitHub Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: base-path
        env:
          CUSTOM_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          GITHUB_PAGES_ROOT: ${{ vars.GITHUB_PAGES_ROOT }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          if [ -n "$CUSTOM_BASE_PATH" ]; then
            printf 'value=%s\n' "$CUSTOM_BASE_PATH" >> "$GITHUB_OUTPUT"
          elif [ "$GITHUB_PAGES_ROOT" = "true" ] || [ "$REPOSITORY_NAME" = "$REPOSITORY_OWNER.github.io" ]; then
            printf 'value=\n' >> "$GITHUB_OUTPUT"
          else
            printf 'value=/%s\n' "$REPOSITORY_NAME" >> "$GITHUB_OUTPUT"
          fi
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base-path.outputs.value }}
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v6
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          enablement: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN || github.token }}
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          path: out
          include-hidden-files: true

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
